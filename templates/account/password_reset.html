{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Recuperar contraseña" %}{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900">{% trans "Recuperar contraseña" %}</h1>
                <p class="text-gray-500 mt-2 text-sm">{% trans "Te enviaremos un email para restablecer tu contraseña." %}</p>
            </div>

            <form method="POST" action="{% url 'account_reset_password' %}" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Email" %}</label>
                    <input type="email" name="email" id="id_email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition text-sm"
                        placeholder="tu@email.com">
                </div>

                <button type="submit"
                    class="w-full bg-primary-600 text-white py-3 rounded-lg font-semibold hover:bg-primary-700 transition text-sm">
                    {% trans "Enviar email" %}
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                <a href="{% url 'account_login' %}" class="text-primary-600 hover:text-primary-700 font-medium">{% trans "Volver al login" %}</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
